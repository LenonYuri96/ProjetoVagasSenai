<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Visualização SENAI</title>
    <!-- Bootstrap 5.3.2 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/indexuser.css">
    <link rel="icon" href="../admin/images/favicon.ico" type="image/x-icon">
</head>

<body class="user-body">
    <!-- Header -->
    <header class="user-header">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-md-4 text-start">
                    <img src="../admin/images/senai-logo-0.png" alt="Logo SENAI" class="logo img-fluid">
                </div>
                <div class="col-md-4 text-center">
                    <h1 class="header-title mb-0">Painel de Visualização</h1>
                </div>
                <div class="col-md-4 text-end">
                    <div id="clock" class="clock-display"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Área de exibição principal -->
    <main id="display-area">
        <!-- Conteúdo será inserido dinamicamente aqui -->
    </main>

    <!-- Footer -->
    <footer class="user-footer">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-md-6 text-start">
                    <p class="mb-0"><i class="fas fa-copyright me-1"></i> 2024 SENAI - Sistema de Vagas</p>
                </div>
                <div class="col-md-6 text-end">
                    <p class="mb-0">Desenvolvido por <strong>Lenon Yuri</strong></p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap Bundle com Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Scripts personalizados -->
    <script src="../admin/js/indexadmin.js"></script>
    <script src="./js/indexuser.js"></script>
</body>

</html>
