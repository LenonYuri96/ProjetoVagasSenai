<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Acesso</title>
    <!-- Incluindo Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
    <link rel="icon" href="./images/favicon.ico" type="image/x-icon">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: var(--senai-blue);">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="./admin/images/senai-logo-0.png" alt="Logo SENAI" class="logo">
            </a>
            <h1 class="navbar-text text-white mb-0 d-none d-lg-block">Painel de Acesso</h1>
            <div class="ms-auto">
                <span id="clock" class="text-white"></span>
            </div>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <main class="py-5">
        <div class="container">
            <div class="access-card text-center">
                <h2 class="welcome-text mb-4">Bem-vindo ao Sistema SENAI</h2>
                <p class="lead text-muted mb-5">Selecione o tipo de acesso desejado:</p>

                <div class="options-container">
                    <a href="./user/indexuser.html" class="btn btn-access btn-user text-white">
                        <i class="fas fa-user"></i> Acesso de Usuário
                    </a>
                    <a href="./admin/indexadminsenai.html" class="btn btn-access btn-admin text-white">
                        <i class="fas fa-lock"></i> Acesso Administrativo
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Rodapé -->
    <footer class="user-footer">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-md-6 text-start">
                    <p class="mb-0"><i class="fas fa-copyright me-1"></i> 2024 SENAI - Sistema de Vagas</p>
                </div>
                <div class="col-md-6 text-end">
                    <p class="mb-0">Desenvolvido por <strong>Lenon Yuri</strong></p>
                </div>
            </div>
        </div>
    </footer>
    <!-- Incluindo Bootstrap JS e script do relógio -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./index.js"></script>
</body>

</html>
